<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAID Calculator Test Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: #f4f4f4;
            padding: 30px;
            line-height: 1.6;
        }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        .test-section {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .pass {
            background: rgba(36, 161, 72, 0.3);
            border-left: 4px solid #24a148;
        }
        .fail {
            background: rgba(218, 30, 40, 0.3);
            border-left: 4px solid #da1e28;
        }
        .test-name {
            font-weight: bold;
            color: #00d4ff;
        }
        .test-details {
            margin-top: 5px;
            font-size: 0.9rem;
            color: #c6c6c6;
        }
        .summary {
            background: rgba(0, 98, 255, 0.2);
            border: 2px solid #0062ff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }
        .summary h2 {
            color: #0062ff;
            margin-bottom: 15px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 15px;
        }
        .stat {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #c6c6c6;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧮 RAID Calculator Test Suite - PreSales Calculator v2.5.2</h1>
        <div id="test-output"></div>
        <div id="summary" class="summary" style="display: none;">
            <h2>Test Summary</h2>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" style="color: #24a148;" id="pass-count">0</div>
                    <div class="stat-label">Tests Passed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #da1e28;" id="fail-count">0</div>
                    <div class="stat-label">Tests Failed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #00d4ff;" id="total-count">0</div>
                    <div class="stat-label">Total Tests</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test tracking
        let testResults = [];
        let passCount = 0;
        let failCount = 0;

        // Unit conversions (copied from main calculator)
        const unitConversions = {
            'B': new Decimal(1),
            'KB': new Decimal(1000),
            'MB': new Decimal(1000).pow(2),
            'GB': new Decimal(1000).pow(3),
            'TB': new Decimal(1000).pow(4),
            'PB': new Decimal(1000).pow(5),
            'EB': new Decimal(1000).pow(6),
            'KiB': new Decimal(1024),
            'MiB': new Decimal(1024).pow(2),
            'GiB': new Decimal(1024).pow(3),
            'TiB': new Decimal(1024).pow(4),
            'PiB': new Decimal(1024).pow(5),
            'EiB': new Decimal(1024).pow(6)
        };

        // RAID formulas (copied from main calculator)
        const raidFormulas = {
            '0': {
                name: 'RAID 0',
                usable: (n) => new Decimal(1),
                minDrives: 2,
                protection: 'None - Any drive failure causes total data loss',
                description: 'Striping across all drives with no redundancy'
            },
            '1': {
                name: 'RAID 1',
                usable: (n) => new Decimal(1).div(2),
                minDrives: 2,
                protection: 'Can lose 1 drive',
                description: 'Full mirroring - 50% storage efficiency'
            },
            '5': {
                name: 'RAID 5',
                usable: (n) => new Decimal(n - 1).div(n),
                minDrives: 3,
                protection: 'Can lose 1 drive',
                description: 'Single parity distributed across all drives'
            },
            '6': {
                name: 'RAID 6',
                usable: (n) => new Decimal(n - 2).div(n),
                minDrives: 4,
                protection: 'Can lose 2 drives simultaneously',
                description: 'Dual parity distributed across all drives'
            },
            '10': {
                name: 'RAID 10',
                usable: (n) => new Decimal(1).div(2),
                minDrives: 4,
                protection: 'Can lose 1 drive per mirrored pair',
                description: 'Striped mirrors - combines RAID 0 and RAID 1'
            },
            '50': {
                name: 'RAID 50',
                usable: (n, groups) => {
                    const drivesPerGroup = Math.floor(n / groups);
                    return new Decimal(drivesPerGroup - 1).div(drivesPerGroup);
                },
                minDrives: 6,
                minGroups: 2,
                protection: 'Can lose 1 drive per RAID 5 group',
                description: 'Multiple RAID 5 arrays striped together'
            },
            '60': {
                name: 'RAID 60',
                usable: (n, groups) => {
                    const drivesPerGroup = Math.floor(n / groups);
                    return new Decimal(drivesPerGroup - 2).div(drivesPerGroup);
                },
                minDrives: 8,
                minGroups: 2,
                protection: 'Can lose 2 drives per RAID 6 group',
                description: 'Multiple RAID 6 arrays striped together'
            }
        };

        // Helper functions
        function logTest(name, passed, details = '') {
            testResults.push({ name, passed, details });
            if (passed) {
                passCount++;
            } else {
                failCount++;
            }
        }

        function displayResults() {
            const output = document.getElementById('test-output');
            const summary = document.getElementById('summary');
            
            let html = '';
            let currentSection = '';
            
            testResults.forEach(result => {
                // Check if this is a section header (starts with emoji or has specific format)
                if (result.name.includes('===') || result.name.startsWith('🔹')) {
                    if (currentSection) {
                        html += '</div>';
                    }
                    html += `<div class="test-section"><h2>${result.name.replace(/===/g, '').trim()}</h2>`;
                    currentSection = result.name;
                } else {
                    const className = result.passed ? 'pass' : 'fail';
                    const icon = result.passed ? '✅' : '❌';
                    html += `
                        <div class="test-result ${className}">
                            <div class="test-name">${icon} ${result.name}</div>
                            ${result.details ? `<div class="test-details">${result.details}</div>` : ''}
                        </div>
                    `;
                }
            });
            
            if (currentSection) {
                html += '</div>';
            }
            
            output.innerHTML = html;
            
            // Show summary
            document.getElementById('pass-count').textContent = passCount;
            document.getElementById('fail-count').textContent = failCount;
            document.getElementById('total-count').textContent = passCount + failCount;
            summary.style.display = 'block';
        }

        // Test functions
        function testUnitConversions() {
            logTest('=== 🔹 Unit Conversion Tests ===', true);
            
            // Test binary units
            const oneTiB = unitConversions['TiB'];
            const expected = new Decimal(1024).pow(4);
            logTest('1 TiB = 1,099,511,627,776 bytes', 
                oneTiB.equals(expected),
                `Calculated: ${oneTiB.toString()} bytes`);
            
            // Test decimal units
            const oneTB = unitConversions['TB'];
            const expectedTB = new Decimal(1000).pow(4);
            logTest('1 TB = 1,000,000,000,000 bytes', 
                oneTB.equals(expectedTB),
                `Calculated: ${oneTB.toString()} bytes`);
            
            // Test mixed unit aggregation
            const twoTB = new Decimal(2).times(unitConversions['TB']);
            const threeGiB = new Decimal(3).times(unitConversions['GiB']);
            const total = twoTB.plus(threeGiB);
            const totalTB = total.div(unitConversions['TB']);
            logTest('2 TB + 3 GiB mixed aggregation',
                totalTB.greaterThan(2) && totalTB.lessThan(2.1),
                `Total: ${totalTB.toFixed(3)} TB (2.003 TB expected)`);
        }

        function testRAIDLevel0() {
            logTest('=== 🔹 RAID Level 0 Tests ===', true);
            
            const config = raidFormulas['0'];
            const numDrives = 4;
            const driveCapacityTB = 2;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives);
            const usableCapacity = rawCapacity.times(usableRatio);
            
            logTest('RAID 0: 4 × 2TB drives = 8TB usable',
                usableCapacity.equals(8),
                `Raw: ${rawCapacity.toString()} TB, Usable: ${usableCapacity.toString()} TB, Efficiency: 100%`);
            
            logTest('RAID 0: Efficiency = 100%',
                usableRatio.equals(1),
                `Calculated efficiency: ${usableRatio.times(100).toString()}%`);
            
            logTest('RAID 0: Minimum 2 drives required',
                config.minDrives === 2,
                `Config requires: ${config.minDrives} drives`);
        }

        function testRAIDLevel1() {
            logTest('=== 🔹 RAID Level 1 Tests ===', true);
            
            const config = raidFormulas['1'];
            const numDrives = 2;
            const driveCapacityTB = 4;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives);
            const usableCapacity = rawCapacity.times(usableRatio);
            
            logTest('RAID 1: 2 × 4TB drives = 4TB usable',
                usableCapacity.equals(4),
                `Raw: ${rawCapacity.toString()} TB, Usable: ${usableCapacity.toString()} TB, Efficiency: 50%`);
            
            logTest('RAID 1: Efficiency = 50%',
                usableRatio.equals(0.5),
                `Calculated efficiency: ${usableRatio.times(100).toString()}%`);
        }

        function testRAIDLevel5() {
            logTest('=== 🔹 RAID Level 5 Tests ===', true);
            
            const config = raidFormulas['5'];
            const numDrives = 4;
            const driveCapacityTB = 2;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives);
            const usableCapacity = rawCapacity.times(usableRatio);
            
            logTest('RAID 5: 4 × 2TB drives = 6TB usable',
                usableCapacity.equals(6),
                `Raw: ${rawCapacity.toString()} TB, Usable: ${usableCapacity.toString()} TB, Efficiency: 75%`);
            
            logTest('RAID 5: Efficiency = (n-1)/n',
                usableRatio.equals(new Decimal(3).div(4)),
                `For 4 drives: (4-1)/4 = ${usableRatio.toString()} = 75%`);
            
            logTest('RAID 5: Minimum 3 drives required',
                config.minDrives === 3,
                `Config requires: ${config.minDrives} drives`);
        }

        function testRAIDLevel6() {
            logTest('=== 🔹 RAID Level 6 Tests ===', true);
            
            const config = raidFormulas['6'];
            const numDrives = 6;
            const driveCapacityTB = 3;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives);
            const usableCapacity = rawCapacity.times(usableRatio);
            
            logTest('RAID 6: 6 × 3TB drives = 12TB usable',
                usableCapacity.equals(12),
                `Raw: ${rawCapacity.toString()} TB, Usable: ${usableCapacity.toString()} TB, Efficiency: 66.67%`);
            
            logTest('RAID 6: Efficiency = (n-2)/n',
                usableRatio.equals(new Decimal(4).div(6)),
                `For 6 drives: (6-2)/6 = ${usableRatio.toString()} = 66.67%`);
            
            logTest('RAID 6: Minimum 4 drives required',
                config.minDrives === 4,
                `Config requires: ${config.minDrives} drives`);
        }

        function testRAIDLevel10() {
            logTest('=== 🔹 RAID Level 10 Tests ===', true);
            
            const config = raidFormulas['10'];
            const numDrives = 4;
            const driveCapacityTB = 2;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives);
            const usableCapacity = rawCapacity.times(usableRatio);
            
            logTest('RAID 10: 4 × 2TB drives = 4TB usable',
                usableCapacity.equals(4),
                `Raw: ${rawCapacity.toString()} TB, Usable: ${usableCapacity.toString()} TB, Efficiency: 50%`);
            
            logTest('RAID 10: Efficiency = 50%',
                usableRatio.equals(0.5),
                `Calculated efficiency: ${usableRatio.times(100).toString()}%`);
            
            logTest('RAID 10: Minimum 4 drives required',
                config.minDrives === 4,
                `Config requires: ${config.minDrives} drives (2 mirrored pairs minimum)`);
        }

        function testRAIDLevel50() {
            logTest('=== 🔹 RAID Level 50 Tests ===', true);
            
            const config = raidFormulas['50'];
            const numDrives = 6;
            const numGroups = 2;
            const driveCapacityTB = 2;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives, numGroups);
            const usableCapacity = rawCapacity.times(usableRatio);
            const drivesPerGroup = Math.floor(numDrives / numGroups);
            
            logTest('RAID 50: 6 drives (2 groups × 3 drives) = 8TB usable',
                usableCapacity.equals(8),
                `2 groups, ${drivesPerGroup} drives/group, efficiency: ${usableRatio.times(100).toFixed(1)}%`);
            
            logTest('RAID 50: Efficiency = (drives_per_group - 1) / drives_per_group',
                usableRatio.equals(new Decimal(2).div(3)),
                `For 3 drives/group: (3-1)/3 = ${usableRatio.toString()} = 66.67%`);
            
            logTest('RAID 50: Minimum 6 drives required',
                config.minDrives === 6,
                `Config requires: ${config.minDrives} drives minimum`);
        }

        function testRAIDLevel60() {
            logTest('=== 🔹 RAID Level 60 Tests ===', true);
            
            const config = raidFormulas['60'];
            const numDrives = 8;
            const numGroups = 2;
            const driveCapacityTB = 2;
            const rawCapacity = new Decimal(numDrives).times(driveCapacityTB);
            const usableRatio = config.usable(numDrives, numGroups);
            const usableCapacity = rawCapacity.times(usableRatio);
            const drivesPerGroup = Math.floor(numDrives / numGroups);
            
            logTest('RAID 60: 8 drives (2 groups × 4 drives) = 8TB usable',
                usableCapacity.equals(8),
                `2 groups, ${drivesPerGroup} drives/group, efficiency: ${usableRatio.times(100).toFixed(1)}%`);
            
            logTest('RAID 60: Efficiency = (drives_per_group - 2) / drives_per_group',
                usableRatio.equals(new Decimal(2).div(4)),
                `For 4 drives/group: (4-2)/4 = ${usableRatio.toString()} = 50%`);
            
            logTest('RAID 60: Minimum 8 drives required',
                config.minDrives === 8,
                `Config requires: ${config.minDrives} drives minimum`);
        }

        function testEdgeCases() {
            logTest('=== 🔹 Edge Case Tests ===', true);
            
            // Test large numbers
            const largeNum = new Decimal(1000);
            const largePB = largeNum.times(unitConversions['PB']);
            const largeEB = largePB.div(unitConversions['EB']);
            logTest('Large number handling: 1000 PB = 1 EB',
                largeEB.equals(1),
                `Calculated: ${largeEB.toString()} EB`);
            
            // Test precision with small numbers
            const smallNum = new Decimal(0.001);
            const result = smallNum.times(unitConversions['TB']);
            logTest('Small number precision: 0.001 TB preserved',
                result.greaterThan(0),
                `Calculated: ${result.toString()} bytes`);
            
            // Test RAID 5 with many drives
            const manyDrives = 16;
            const raid5Ratio = raidFormulas['5'].usable(manyDrives);
            const expectedRatio = new Decimal(15).div(16);
            logTest('RAID 5 with 16 drives: 93.75% efficiency',
                raid5Ratio.equals(expectedRatio),
                `Efficiency: ${raid5Ratio.times(100).toFixed(2)}%`);
        }

        function testStorageAggregation() {
            logTest('=== 🔹 Storage Aggregation Tests ===', true);
            
            // Test: 1 TB + 500 GB + 256 GiB
            const storage1 = new Decimal(1).times(unitConversions['TB']);
            const storage2 = new Decimal(500).times(unitConversions['GB']);
            const storage3 = new Decimal(256).times(unitConversions['GiB']);
            const total = storage1.plus(storage2).plus(storage3);
            const totalTB = total.div(unitConversions['TB']);
            
            logTest('Mixed units: 1 TB + 500 GB + 256 GiB aggregation',
                totalTB.greaterThan(1.7) && totalTB.lessThan(1.8),
                `Total: ${totalTB.toFixed(3)} TB (~1.775 TB expected)`);
            
            // Test: Multiple TiB units
            const tib1 = new Decimal(10).times(unitConversions['TiB']);
            const tib2 = new Decimal(5).times(unitConversions['TiB']);
            const totalTiB = tib1.plus(tib2).div(unitConversions['TiB']);
            logTest('Same units: 10 TiB + 5 TiB = 15 TiB',
                totalTiB.equals(15),
                `Total: ${totalTiB.toString()} TiB`);
        }

        // Run all tests
        function runAllTests() {
            console.log('Starting RAID Calculator Test Suite...');
            
            testUnitConversions();
            testRAIDLevel0();
            testRAIDLevel1();
            testRAIDLevel5();
            testRAIDLevel6();
            testRAIDLevel10();
            testRAIDLevel50();
            testRAIDLevel60();
            testEdgeCases();
            testStorageAggregation();
            
            displayResults();
            
            console.log(`Tests complete: ${passCount} passed, ${failCount} failed`);
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
